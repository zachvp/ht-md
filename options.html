<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>settings</title>
  <link rel="icon" href="icons/icon128.png">
  <link rel="stylesheet" href="content.css">
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <h1>settings</h1>

  <div class="section group" id="{{ functionality.sectionId }}">
    <span class="group-label">{{ functionality.label }}</span>
    <div class="section-body" hidden>
      <div class="group-row" id="{{ functionality.rowId }}"></div>
    </div>
  </div>

  <div class="section group avatar-section" id="{{ cursor.sectionId }}">
    <span class="group-label">{{ cursor.label }}</span>
    <div class="section-layout">
      <div class="avatar" id="{{ cursor.preview.id }}"{{ cursor.preview.styleAttr }}></div>
      <div class="section-params" hidden>
        <div class="group-row" id="{{ cursor.rowId }}"></div>
      </div>
    </div>
  </div>

  <div class="section group avatar-section" id="{{ highlight.sectionId }}">
    <span class="group-label">{{ highlight.label }}</span>
    <div class="section-layout">
      <div class="avatar" id="{{ highlight.preview.id }}"{{ highlight.preview.styleAttr }}></div>
      <div class="section-params" hidden>
        <div class="group-row" id="{{ highlight.rowId }}"></div>
      </div>
    </div>
  </div>

  <div class="section group avatar-section" id="{{ message.sectionId }}">
    <span class="group-label">{{ message.label }}</span>
    <div class="section-layout">
      <div class="avatar" id="{{ message.preview.id }}"{{ message.preview.styleAttr }}></div>
      <div class="section-params" hidden>
        <div class="group-row" id="{{ message.rowId }}"></div>
      </div>
    </div>
  </div>

  <div class="section group avatar-section" id="{{ badge.sectionId }}">
    <span class="group-label">{{ badge.label }}</span>
    <div class="section-layout">
      <div class="avatar" id="{{ badge.preview.id }}"{{ badge.preview.styleAttr }}></div>
      <div class="section-params" hidden>
        <div class="group-row" id="{{ badge.rowId }}"></div>
      </div>
    </div>
  </div>

  <div class="section group avatar-section" id="{{ options.sectionId }}">
    <span class="group-label">{{ options.label }}</span>
    <div class="section-layout">
      <div class="avatar" id="{{ options.preview.id }}"{{ options.preview.styleAttr }}></div>
      <div class="section-params" hidden>
        <div class="group-row" id="{{ options.rowId }}"></div>
      </div>
    </div>
  </div>

  <div class="section group" id="section-rawconfig">
    <span class="group-label">Raw Config Data</span>
    <div class="section-body" hidden>
      <div class="group-row" style="margin-bottom:0.6rem;">
        <button id="copyJsonBtn" class="cfg-btn" type="button">Copy</button>
        <button id="applyJsonBtn" class="cfg-btn" type="button">Apply</button>
        <button id="exportBtn" class="cfg-btn" type="button">Download</button>
        <label class="cfg-btn" style="cursor:pointer;">Load file<input type="file" id="importFile" accept=".json" style="display:none"></label>
      </div>
      <textarea id="configJson" spellcheck="false"></textarea>
    </div>
  </div>

  <template id="tmpl-tooltip">
    <span class="info-wrap">
      <span class="info-icon">ⓘ</span>
      <span class="info-tip"></span>
    </span>
  </template>

  <template id="tmpl-num-spinner">
    <div class="num-wrap">
      <div class="num-btns">
        <button class="num-btn" type="button">▴</button>
        <button class="num-btn" type="button">▾</button>
      </div>
    </div>
  </template>

  <template id="tmpl-plane">
    <span class="plane-coords">0, 0</span>
    <div class="plane">
      <div class="plane-hline"></div>
      <div class="plane-vline"></div>
      <div class="plane-dot"></div>
    </div>
  </template>

  <p id="status"></p>
  <script src="options.js"></script>
</body>
</html>
