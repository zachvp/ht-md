<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>web→md settings</title>
  <style>
    body {
      font-family: Monaco, Menlo, ui-monospace, 'Courier New', monospace;
      padding: 1.5rem;
    }
    h1 { margin: 0 0 1.25rem; }

    .setting { margin-bottom: 1.1rem; }
    label.checkbox { display: flex; align-items: center; gap: 0.4rem; cursor: pointer; }

    /* Info tooltip */
    .info-wrap { position: relative; display: inline-flex; align-items: center; }
    .info-icon { font-style: normal; opacity: 0.55; cursor: help; line-height: 1; }
    .info-tip {
      display: none;
      position: absolute;
      left: 1.4rem; top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.82);
      color: #fff;
      padding: 0.3rem 0.5rem;
      border-radius: 4px;
      width: 200px;
      z-index: 100;
      pointer-events: none;
      line-height: 1.4;
    }
    .info-wrap:hover .info-tip { display: block; }

    .group { margin-bottom: 1.1rem; }
    .group-label { display: block; text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.55; margin-bottom: 0.45rem; }
    .group-row { display: flex; align-items: flex-end; gap: 0.75rem; flex-wrap: wrap; }

    .field { display: flex; align-items: baseline; gap: 0.3rem; }
    .unit { opacity: 0.65; }

    /* Number inputs — hide native spinners */
    input[type=number] {
      -moz-appearance: textfield;
      width: 4rem;
      font-family: inherit;
      font-size: inherit;
      border: 1px solid currentColor;
      border-right: none;
      border-radius: 3px 0 0 3px;
      padding: 0.15rem 0.3rem;
      background: var(--ui-overlay-sm, rgba(0,0,0,0.08));
      color: inherit;
      text-align: right;
    }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { display: none; }

    /* Custom spinner buttons (injected by JS) */
    .num-wrap { display: flex; align-items: stretch; }
    .num-btns {
      display: flex; flex-direction: column;
      border: 1px solid currentColor;
      border-radius: 0 3px 3px 0;
      overflow: hidden;
    }
    .num-btn {
      all: unset;
      color: inherit;
      display: flex; align-items: center; justify-content: center;
      width: 1.1rem;
      flex: 1;
      font-size: 0.6em;
      cursor: pointer;
      opacity: 0.65;
      box-sizing: border-box;
      line-height: 1;
    }
    .num-btn:first-child { border-bottom: 1px solid currentColor; }
    .num-btn:hover { background: var(--ui-overlay-md, rgba(0,0,0,0.12)); opacity: 1; }
    .num-btn:active { background: var(--ui-overlay-lg, rgba(0,0,0,0.22)); }

    /* Color field: swatch + text input */
    .color-swatch {
      width: 1.2em; height: 1.2em;
      border: 1px solid currentColor;
      border-radius: 2px;
      flex-shrink: 0;
      display: inline-block;
      align-self: center;
    }
    input.color-text {
      width: 8rem;
      font-family: inherit;
      font-size: inherit;
      border: 1px solid currentColor;
      border-radius: 3px;
      padding: 0.15rem 0.3rem;
      background: var(--ui-overlay-sm, rgba(0,0,0,0.08));
      color: inherit;
    }

    /* Emoji picker button + panel */
    .emoji-pick-wrap { position: relative; display: inline-block; align-self: center; }
    .emoji-pick-btn {
      all: unset;
      font-size: 1.4em;
      width: 2.2rem;
      height: 2.2rem;
      text-align: center;
      border: 1px solid currentColor;
      border-radius: 3px;
      background: var(--ui-overlay-sm, rgba(0,0,0,0.08));
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
    }
    .emoji-pick-btn:hover { background: var(--ui-overlay-md, rgba(0,0,0,0.15)); }
    .emoji-picker-panel {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      z-index: 200;
      box-shadow: 0 4px 16px var(--ui-shadow, rgba(0,0,0,0.25));
      border-radius: 8px;
      overflow: hidden;
    }

    /* 2D offset plane */
    .plane-wrap { display: flex; align-items: center; gap: 0.4rem; }
    .plane {
      position: relative; width: 72px; height: 72px;
      border: 1px solid currentColor;
      box-sizing: border-box;
      cursor: crosshair;
      flex-shrink: 0;
    }
    .plane-hline, .plane-vline {
      position: absolute; background: currentColor; opacity: 0.2; pointer-events: none;
    }
    .plane-hline { width: 100%; height: 1px; top: 50%; left: 0; }
    .plane-vline { width: 1px; height: 100%; left: 50%; top: 0; }
    .plane-dot {
      position: absolute; width: 10px; height: 10px;
      border-radius: 50%; background: #3399ff;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .plane-coords { opacity: 0.65; min-width: 3.5rem; }

    .section {
      background: var(--ui-overlay-xs, rgba(0,0,0,0.06));
      border-radius: 8px;
      padding: 0.85rem 1rem;
      margin-bottom: 0.75rem;
    }

    #status { margin-top: 0.75rem; color: #47C0FF; min-height: 1em; }
  </style>
</head>
<body>
  <h1>web→md settings</h1>

  <div class="section group">
    <span class="group-label">Cursor</span>
    <div class="group-row">
      <div class="field">pick <div class="emoji-pick-wrap"><button class="emoji-pick-btn" id="cursorEmojiBtn" type="button">📌</button></div></div>
      <div class="field">multi <div class="emoji-pick-wrap"><button class="emoji-pick-btn" id="multiCursorEmojiBtn" type="button">📝</button></div></div>
      <div class="field">size <input type="number" id="cursorSize" min="16" max="1024" step="4"><span class="unit">px</span></div>
      <div class="field">facing <input type="number" id="facingX" min="-1" max="1" step="0.1"><span class="unit">x</span> <input type="number" id="facingY" min="-1" max="1" step="0.1"><span class="unit">y</span></div>
      <div class="field plane-wrap">
        offset
        <div class="plane" id="offsetPlane">
          <div class="plane-hline"></div>
          <div class="plane-vline"></div>
          <div class="plane-dot" id="offsetDot"></div>
        </div>
        <span class="plane-coords" id="offsetCoords">0, 0</span>
      </div>
    </div>
  </div>

  <div class="section group">
    <span class="group-label">Highlight</span>
    <div class="group-row">
      <div class="field">
        <span class="color-swatch" id="outlineColorSwatch"></span>
        <input type="text" id="outlineColor" class="color-text" placeholder="#rrggbb or rgba(...)">
      </div>
      <div class="field">outer <input type="number" id="outlineWidth" min="1" max="1024" step="1"><span class="unit">px</span></div>
      <div class="field">inner <input type="number" id="insetWidth" min="0" max="1024" step="1"><span class="unit">px</span></div>
    </div>
  </div>

  <div class="section group">
    <span class="group-label">Message</span>
    <div class="group-row">
      <div class="field">font <input type="number" id="flashFontSize" min="1" max="1024" step="1"><span class="unit">px</span></div>
      <div class="field">pause <input type="number" id="flashPause" min="0" max="5000" step="50"><span class="unit">ms</span></div>
      <div class="field">fall <input type="number" id="flashDuration" min="100" max="10000" step="100"><span class="unit">ms</span></div>
      <div class="field">dist <input type="number" id="flashFallDistance" min="0" max="2000" step="10"><span class="unit">px</span></div>
      <div class="field">
        <span class="color-swatch" id="flashFontColorSwatch"></span>
        <input type="text" id="flashFontColor" class="color-text" placeholder="color">
      </div>
    </div>
  </div>

  <div class="section group">
    <span class="group-label">Options</span>
    <div class="group-row">
      <div class="field">font <input type="number" id="optionsFontSize" min="1" max="1024" step="1"><span class="unit">px</span></div>
      <div class="field">font color
        <span class="color-swatch" id="optionsFontColorSwatch"></span>
        <input type="text" id="optionsFontColor" class="color-text" placeholder="font color">
      </div>
      <div class="field">bg
        <span class="color-swatch" id="optionsBgColorSwatch"></span>
        <input type="text" id="optionsBgColor" class="color-text" placeholder="background">
      </div>
      <div class="field">section
        <span class="color-swatch" id="sectionBgColorSwatch"></span>
        <input type="text" id="sectionBgColor" class="color-text" placeholder="section">
      </div>
    </div>
  </div>

  <details class="section">
    <summary style="cursor:pointer;opacity:0.65;letter-spacing:0.08em;text-transform:uppercase;">Advanced</summary>
    <div class="group-row" style="margin-top:0.65rem;">
      <div class="field">offset range <input type="number" id="offsetMax" min="1" max="1000" step="1"><span class="unit">±</span></div>
      <div class="field">saved flash <input type="number" id="savedFlashDuration" min="100" max="10000" step="100"><span class="unit">ms</span></div>
      <div class="section setting">
        <label class="checkbox">
          <input type="checkbox" id="includeSvg">
          Include SVG in output
          <span class="info-wrap">
            <span class="info-icon">ⓘ</span>
            <span class="info-tip">When on, inline SVGs and SVG data URIs are included in the copied Markdown output.</span>
          </span>
        </label>
      </div>
    </div>
  </details>

  <p id="status"></p>
  <script src="options.js"></script>
</body>
</html>
